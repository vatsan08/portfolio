<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard // SR Portfolio CMS</title>
  
  <!-- Fonts Link -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <style>
    /* -------------------------------------------------------------
       1. Core Styling & Design Tokens
       ------------------------------------------------------------- */
    :root {
      --bg: #08080d;
      --bg2: #0f0f16;
      --bg3: #16161f;
      --accent: #c6f135;
      --accent2: #7fffda;
      --text: #eeede6;
      --muted: #6b6b7e;
      --border: rgba(198, 241, 53, 0.13);
      --card: rgba(255, 255, 255, 0.025);
      
      --f-disp: 'DM Serif Display', serif;
      --f-sans: 'Syne', sans-serif;
      --f-mono: 'DM Mono', monospace;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    html, body {
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--f-sans);
      min-height: 100vh;
    }
    
    /* Custom Cursor */
    .cursor-dot, .cursor-ring {
      position: fixed;
      top: 0;
      left: 0;
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 9999;
      opacity: 0;
      transition: opacity 0.3s ease, transform 0.2s ease, border-color 0.2s ease;
    }
    .cursor-dot {
      width: 9px;
      height: 9px;
      background-color: var(--accent);
      mix-blend-mode: difference;
    }
    .cursor-ring {
      width: 34px;
      height: 34px;
      border: 1.5px solid rgba(198, 241, 53, 0.5);
      background-color: transparent;
    }
    .cursor-ring.hover {
      transform: translate(-50%, -50%) scale(1.4);
      border-color: var(--accent);
      background-color: rgba(198, 241, 53, 0.05);
    }
    
    @media (hover: hover) and (pointer: fine) {
      body, a, button, [role="button"], input, textarea, select {
        cursor: none !important;
      }
    }
    
    /* Containers */
    .admin-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 4rem 1.5rem;
    }
    
    /* Login Form Styles */
    .login-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 80vh;
    }
    .login-card {
      width: 100%;
      max-width: 420px;
      border: 1px solid var(--border);
      background-color: var(--bg2);
      padding: 3rem;
    }
    .login-title {
      font-family: var(--f-disp);
      font-size: 2.2rem;
      font-weight: 400;
      color: var(--text);
      margin-bottom: 2rem;
      text-align: center;
    }
    
    /* Form Elements */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }
    .form-label {
      font-family: var(--f-mono);
      font-size: 0.68rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .form-input, .form-textarea {
      background-color: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 1rem;
      font-family: var(--f-sans);
      font-size: 0.95rem;
      border-radius: 0px;
      transition: border-color 0.25s ease, background-color 0.25s ease;
    }
    .form-input:focus, .form-textarea:focus {
      outline: none;
      border-color: var(--accent);
      background-color: var(--bg3);
    }
    .form-textarea {
      resize: vertical;
      min-height: 120px;
    }
    .btn-submit {
      width: 100%;
      background-color: var(--accent);
      color: var(--bg);
      border: none;
      font-family: var(--f-sans);
      font-size: 0.78rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      padding: 0.9rem;
      transition: transform 0.2s ease, background-color 0.2s ease;
      cursor: pointer;
    }
    .btn-submit:hover {
      transform: translateY(-2px);
      background-color: #d5ff40;
    }
    .login-error {
      font-family: var(--f-mono);
      font-size: 0.78rem;
      color: #ff5e5e;
      margin-top: 1rem;
      text-align: center;
    }
    
    /* Dashboard Panels */
    .dashboard-panel {
      display: none;
    }
    .dashboard-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      padding-bottom: 2rem;
      margin-bottom: 3rem;
    }
    .dashboard-title {
      font-family: var(--f-disp);
      font-size: 2.5rem;
      font-weight: 400;
    }
    .btn-logout {
      background-color: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      font-family: var(--f-sans);
      font-size: 0.73rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.6rem 1.4rem;
      transition: color 0.2s, border-color 0.2s;
      cursor: pointer;
    }
    .btn-logout:hover {
      color: var(--accent);
      border-color: var(--accent);
    }
    
    /* Section Tabs */
    .admin-tabs {
      display: flex;
      gap: 1.5rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 3rem;
    }
    .admin-tab {
      font-family: var(--f-sans);
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      padding: 1rem 0;
      border: none;
      background: none;
      cursor: pointer;
      position: relative;
      transition: color 0.2s;
    }
    .admin-tab:hover {
      color: var(--text);
    }
    .admin-tab.active {
      color: var(--accent);
    }
    .admin-tab.active::after {
      content: "";
      position: absolute;
      bottom: -1px;
      left: 0;
      width: 100%;
      height: 2px;
      background-color: var(--accent);
    }
    
    /* Admin Sections */
    .admin-section {
      display: none;
    }
    .admin-section.active {
      display: block;
    }
    
    /* Messaging Table & Items */
    .msg-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .msg-card {
      border: 1px solid var(--border);
      background-color: var(--bg2);
      padding: 2rem;
    }
    .msg-meta {
      display: flex;
      justify-content: space-between;
      font-family: var(--f-mono);
      font-size: 0.68rem;
      color: var(--accent);
      margin-bottom: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .msg-sender {
      font-family: var(--f-sans);
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.25rem;
    }
    .msg-email {
      font-family: var(--f-mono);
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 1.25rem;
    }
    .msg-body {
      font-family: var(--f-sans);
      font-size: 0.95rem;
      line-height: 1.7;
      color: rgba(238, 237, 230, 0.72);
      white-space: pre-wrap;
    }
    
    /* Dynamic Form & Manager Lists */
    .crud-layout {
      display: grid;
      grid-template-columns: 1fr 1.5fr;
      gap: 4rem;
      align-items: start;
    }
    @media (max-width: 860px) {
      .crud-layout {
        grid-template-columns: 1fr;
        gap: 3rem;
      }
    }
    .form-panel {
      border: 1px solid var(--border);
      background-color: var(--bg2);
      padding: 2rem;
    }
    .form-panel-title {
      font-family: var(--f-disp);
      font-size: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .data-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .data-card {
      border: 1px solid var(--border);
      background-color: var(--card);
      padding: 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .data-card-info {
      flex: 1;
    }
    .data-card-title {
      font-family: var(--f-disp);
      font-size: 1.25rem;
      color: var(--text);
      margin-bottom: 0.25rem;
    }
    .data-card-meta {
      font-family: var(--f-mono);
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
    }
    .data-card-actions {
      display: flex;
      gap: 1rem;
    }
    .btn-action {
      background: none;
      border: none;
      font-family: var(--f-mono);
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      padding: 0.4rem;
      transition: color 0.2s;
    }
    .btn-action.edit {
      color: var(--accent2);
    }
    .btn-action.edit:hover {
      opacity: 0.8;
    }
    .btn-action.delete {
      color: #ff5e5e;
    }
    .btn-action.delete:hover {
      opacity: 0.8;
    }
  </style>
</head>
<body>

  <!-- Custom Cursor Elements -->
  <div class="cursor-dot"></div>
  <div class="cursor-ring"></div>

  <div class="admin-container">
    
    <!-- 1. LOGIN INTERFACE -->
    <div id="login-panel" class="login-wrapper">
      <div class="login-card">
        <h1 class="login-title">SR // Portfolio CMS</h1>
        <form id="login-form">
          <div class="form-group">
            <label for="username" class="form-label">Username</label>
            <input type="text" id="username" class="form-input" required placeholder="admin">
          </div>
          <div class="form-group">
            <label for="password" class="form-label">Password</label>
            <input type="password" id="password" class="form-input" required placeholder="admin123">
          </div>
          <button type="submit" class="btn-submit">Secure Log In</button>
          <div id="login-error" class="login-error"></div>
        </form>
      </div>
    </div>
    
    <!-- 2. ADMIN DASHBOARD -->
    <div id="dashboard-panel" class="dashboard-panel">
      <header class="dashboard-header">
        <div>
          <h1 class="dashboard-title">SR CMS Portal</h1>
          <p style="font-family: var(--f-mono); font-size: 0.68rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 0.5rem;">Srivatsan Rangarajan Portfolio Manager</p>
        </div>
        <button id="logout-btn" class="btn-logout">Logout</button>
      </header>
      
      <!-- Nav Tabs -->
      <div class="admin-tabs">
        <button class="admin-tab active" data-tab="messages">Messages</button>
        <button class="admin-tab" data-tab="projects">Projects</button>
        <button class="admin-tab" data-tab="certifications">Certifications</button>
      </div>
      
      <!-- Dynamic Sections -->
      
      <!-- Messages Tab -->
      <section id="tab-messages" class="admin-section active">
        <div class="msg-list" id="contacts-list">
          <div style="font-family: var(--f-mono); color: var(--muted);">Loading messages...</div>
        </div>
      </section>
      
      <!-- Projects Tab -->
      <section id="tab-projects" class="admin-section">
        <div class="crud-layout">
          <!-- Form Panel -->
          <div class="form-panel">
            <h2 id="project-form-title" class="form-panel-title">Add Project</h2>
            <form id="project-form">
              <input type="hidden" id="project-id" value="">
              <div class="form-group">
                <label for="project-index" class="form-label">Index Num</label>
                <input type="text" id="project-index" class="form-input" required placeholder="e.g. 05">
              </div>
              <div class="form-group">
                <label for="project-badge" class="form-label">Badge (Optional)</label>
                <input type="text" id="project-badge" class="form-input" placeholder="e.g. Published · GJEIIR">
              </div>
              <div class="form-group">
                <label for="project-title" class="form-label">Project Title</label>
                <input type="text" id="project-title" class="form-input" required placeholder="Project Name">
              </div>
              <div class="form-group">
                <label for="project-desc" class="form-label">Description</label>
                <textarea id="project-desc" class="form-textarea" required placeholder="Enter description details"></textarea>
              </div>
              <div class="form-group">
                <label for="project-tech" class="form-label">Tech Stack (comma-separated)</label>
                <input type="text" id="project-tech" class="form-input" placeholder="e.g. Java, Spring Boot, SQL">
              </div>
              <button type="submit" class="btn-submit" id="project-submit-btn">Save Project</button>
              <button type="button" class="btn-logout" id="cancel-project-edit" style="width: 100%; margin-top: 0.5rem; display: none;">Cancel Edit</button>
            </form>
          </div>
          <!-- List Panel -->
          <div>
            <h2 class="form-panel-title" style="margin-bottom: 1.5rem;">Existing Projects</h2>
            <div class="data-list" id="projects-list">
              <div style="font-family: var(--f-mono); color: var(--muted);">Loading projects...</div>
            </div>
          </div>
        </div>
      </section>
      
      <!-- Certifications Tab -->
      <section id="tab-certifications" class="admin-section">
        <div class="crud-layout">
          <!-- Form Panel -->
          <div class="form-panel">
            <h2 id="cert-form-title" class="form-panel-title">Add Certification</h2>
            <form id="cert-form">
              <input type="hidden" id="cert-id" value="">
              <div class="form-group">
                <label for="cert-issuer" class="form-label">Issuer</label>
                <input type="text" id="cert-issuer" class="form-input" required placeholder="e.g. Coursera">
              </div>
              <div class="form-group">
                <label for="cert-name" class="form-label">Certification Title</label>
                <input type="text" id="cert-name" class="form-input" required placeholder="e.g. Full-Stack Dev">
              </div>
              <button type="submit" class="btn-submit" id="cert-submit-btn">Save Certification</button>
              <button type="button" class="btn-logout" id="cancel-cert-edit" style="width: 100%; margin-top: 0.5rem; display: none;">Cancel Edit</button>
            </form>
          </div>
          <!-- List Panel -->
          <div>
            <h2 class="form-panel-title" style="margin-bottom: 1.5rem;">Existing Credentials</h2>
            <div class="data-list" id="certs-list">
              <div style="font-family: var(--f-mono); color: var(--muted);">Loading certifications...</div>
            </div>
          </div>
        </div>
      </section>
      
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      
      // 1. Custom Cursor Lerp Logic
      const cursorDot = document.querySelector('.cursor-dot');
      const cursorRing = document.querySelector('.cursor-ring');
      
      let mouseX = 0, mouseY = 0;
      let ringX = 0, ringY = 0;
      let isMoving = false;
      
      window.addEventListener('mousemove', (e) => {
        isMoving = true;
        if (cursorDot.style.opacity === '0' || !cursorDot.style.opacity) {
          cursorDot.style.opacity = '1';
          cursorRing.style.opacity = '1';
        }
        mouseX = e.clientX;
        mouseY = e.clientY;
        cursorDot.style.left = mouseX + 'px';
        cursorDot.style.top = mouseY + 'px';
      });
      
      document.addEventListener('mouseleave', () => {
        cursorDot.style.opacity = '0';
        cursorRing.style.opacity = '0';
      });
      
      document.addEventListener('mouseenter', () => {
        if (isMoving) {
          cursorDot.style.opacity = '1';
          cursorRing.style.opacity = '1';
        }
      });
      
      function tick() {
        ringX += (mouseX - ringX) * 0.15;
        ringY += (mouseY - ringY) * 0.15;
        cursorRing.style.left = ringX + 'px';
        cursorRing.style.top = ringY + 'px';
        requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
      
      const addHoverClass = () => cursorRing.classList.add('hover');
      const removeHoverClass = () => cursorRing.classList.remove('hover');
      
      const setupCursorHovers = () => {
        const hoverSelectors = 'a, button, input, textarea, .btn-submit, .btn-logout, .btn-action';
        document.querySelectorAll(hoverSelectors).forEach(el => {
          el.removeEventListener('mouseenter', addHoverClass);
          el.removeEventListener('mouseleave', removeHoverClass);
          el.addEventListener('mouseenter', addHoverClass);
          el.addEventListener('mouseleave', removeHoverClass);
        });
      };
      
      setupCursorHovers();
      
      // Helper to dynamically resolve API endpoints depending on the origin/protocol
      const getApiUrl = (endpoint) => {
        const isDefaultPort = window.location.port === '3000';
        const isFileProtocol = window.location.protocol === 'file:';
        const isLocalhost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
        
        if (isFileProtocol || (isLocalhost && !isDefaultPort)) {
          return `http://localhost:3000${endpoint}`;
        }
        return endpoint;
      };

      // 2. Authentication UI & Checks
      const checkAuth = () => {
        fetch(getApiUrl('/api/auth/status'), { credentials: 'include' })
          .then(res => res.json())
          .then(data => {
            if (data.loggedIn) {
              document.getElementById('login-panel').style.display = 'none';
              document.getElementById('dashboard-panel').style.display = 'block';
              loadDashboardData();
            } else {
              document.getElementById('login-panel').style.display = 'flex';
              document.getElementById('dashboard-panel').style.display = 'none';
            }
            setupCursorHovers();
          });
      };
      
      // Submit Login Form
      const loginForm = document.getElementById('login-form');
      const loginError = document.getElementById('login-error');
      
      loginForm.addEventListener('submit', (e) => {
        e.preventDefault();
        loginError.textContent = '';
        
        const payload = {
          username: loginForm.username.value,
          password: loginForm.password.value
        };
        
        fetch(getApiUrl('/api/auth/login'), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
          credentials: 'include'
        })
        .then(res => {
          if (!res.ok) throw new Error('Invalid credentials or login error.');
          return res.json();
        })
        .then(data => {
          checkAuth();
        })
        .catch(err => {
          loginError.textContent = err.message;
        });
      });
      
      // Logout Button
      const logoutBtn = document.getElementById('logout-btn');
      logoutBtn.addEventListener('click', () => {
        fetch(getApiUrl('/api/auth/logout'), { method: 'POST', credentials: 'include' })
          .then(() => checkAuth());
      });
      
      // Tab Navigation
      const tabs = document.querySelectorAll('.admin-tab');
      tabs.forEach(tab => {
        tab.addEventListener('click', () => {
          tabs.forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          
          document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
          document.getElementById(`tab-${tab.dataset.tab}`).classList.add('active');
          setupCursorHovers();
        });
      });
      
      /* -------------------------------------------------------------
         3. Dynamic Content CRUD Helpers
         ------------------------------------------------------------- */
      
      const loadDashboardData = () => {
        loadMessages();
        loadProjectsList();
        loadCertificationsList();
      };
      
      // Load and Render Messages
      const loadMessages = () => {
        const listDiv = document.getElementById('contacts-list');
        fetch(getApiUrl('/api/admin/contacts'), { credentials: 'include' })
          .then(res => res.json())
          .then(messages => {
            if (messages.length === 0) {
               listDiv.innerHTML = `<div style="font-family: var(--f-mono); color: var(--muted);">No messages found in log.</div>`;
               return;
            }
            listDiv.innerHTML = messages.map(msg => `
              <div class="msg-card">
                <div class="msg-meta">
                  <span>ID: CM-${msg.id}</span>
                  <span>Received: ${new Date(msg.created_at).toLocaleString()}</span>
                </div>
                <h3 class="msg-sender">${msg.name}</h3>
                <div class="msg-email">${msg.email}</div>
                <p class="msg-body">${msg.message}</p>
              </div>
            `).join('');
            setupCursorHovers();
          })
          .catch(err => {
            listDiv.innerHTML = `<div style="font-family: var(--f-mono); color: #ff5e5e;">Error loading messages: ${err.message}</div>`;
          });
      };
      
      // Load and Render Projects List
      const loadProjectsList = () => {
        const listDiv = document.getElementById('projects-list');
        fetch(getApiUrl('/api/projects'))
          .then(res => res.json())
          .then(projects => {
            if (projects.length === 0) {
              listDiv.innerHTML = `<div style="font-family: var(--f-mono); color: var(--muted);">No projects found.</div>`;
              return;
            }
            listDiv.innerHTML = projects.map(proj => `
              <div class="data-card">
                <div class="data-card-info">
                  <h3 class="data-card-title">${proj.title}</h3>
                  <div class="data-card-meta">Index: ${proj.index_num} ${proj.badge ? `&middot; ${proj.badge}` : ''}</div>
                </div>
                <div class="data-card-actions">
                  <button class="btn-action edit" onclick="editProject(${proj.id})">Edit</button>
                  <button class="btn-action delete" onclick="deleteProject(${proj.id})">Delete</button>
                </div>
              </div>
            `).join('');
            
            // Map global references for edit click handlers
            window.allProjects = projects;
            setupCursorHovers();
          })
          .catch(err => {
            listDiv.innerHTML = `<div style="font-family: var(--f-mono); color: #ff5e5e;">Error loading projects: ${err.message}</div>`;
          });
      };
      
      // Load and Render Certifications List
      const loadCertificationsList = () => {
        const listDiv = document.getElementById('certs-list');
        fetch(getApiUrl('/api/certifications'))
          .then(res => res.json())
          .then(certs => {
            if (certs.length === 0) {
              listDiv.innerHTML = `<div style="font-family: var(--f-mono); color: var(--muted);">No certifications found.</div>`;
              return;
            }
            listDiv.innerHTML = certs.map(c => `
              <div class="data-card">
                <div class="data-card-info">
                  <h3 class="data-card-title">${c.name}</h3>
                  <div class="data-card-meta">Issuer: ${c.issuer}</div>
                </div>
                <div class="data-card-actions">
                  <button class="btn-action edit" onclick="editCertification(${c.id})">Edit</button>
                  <button class="btn-action delete" onclick="deleteCertification(${c.id})">Delete</button>
                </div>
              </div>
            `).join('');
            
            window.allCerts = certs;
            setupCursorHovers();
          })
          .catch(err => {
            listDiv.innerHTML = `<div style="font-family: var(--f-mono); color: #ff5e5e;">Error loading certifications: ${err.message}</div>`;
          });
      };
      
      /* -------------------------------------------------------------
         4. CRUD Form Handlers
         ------------------------------------------------------------- */
         
      // Project Add / Edit
      const projectForm = document.getElementById('project-form');
      const projectCancelBtn = document.getElementById('cancel-project-edit');
      
      projectForm.addEventListener('submit', (e) => {
        e.preventDefault();
        
        const id = document.getElementById('project-id').value;
        const payload = {
          index_num: document.getElementById('project-index').value,
          badge: document.getElementById('project-badge').value,
          title: document.getElementById('project-title').value,
          description: document.getElementById('project-desc').value,
          tech: document.getElementById('project-tech').value
        };
        
        const url = id ? `/api/admin/projects/${id}` : '/api/admin/projects';
        const method = id ? 'PUT' : 'POST';
        
        fetch(getApiUrl(url), {
          method: method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
          credentials: 'include'
        })
        .then(res => {
          if (!res.ok) throw new Error('Failed to save project.');
          return res.json();
        })
        .then(() => {
          projectForm.reset();
          document.getElementById('project-id').value = '';
          document.getElementById('project-form-title').textContent = 'Add Project';
          document.getElementById('project-submit-btn').textContent = 'Save Project';
          projectCancelBtn.style.display = 'none';
          loadProjectsList();
        })
        .catch(err => alert(err.message));
      });
      
      projectCancelBtn.addEventListener('click', () => {
        projectForm.reset();
        document.getElementById('project-id').value = '';
        document.getElementById('project-form-title').textContent = 'Add Project';
        document.getElementById('project-submit-btn').textContent = 'Save Project';
        projectCancelBtn.style.display = 'none';
      });
      
      // Global window binding triggers (called from inline html strings)
      window.editProject = (id) => {
        const proj = window.allProjects.find(p => p.id === id);
        if (!proj) return;
        
        document.getElementById('project-id').value = proj.id;
        document.getElementById('project-index').value = proj.index_num;
        document.getElementById('project-badge').value = proj.badge || '';
        document.getElementById('project-title').value = proj.title;
        document.getElementById('project-desc').value = proj.description;
        document.getElementById('project-tech').value = Array.isArray(proj.tech) ? proj.tech.join(', ') : proj.tech;
        
        document.getElementById('project-form-title').textContent = 'Edit Project';
        document.getElementById('project-submit-btn').textContent = 'Update Project';
        projectCancelBtn.style.display = 'block';
        window.scrollTo({ top: projectForm.getBoundingClientRect().top + window.pageYOffset - 120, behavior: 'smooth' });
      };
      
      window.deleteProject = (id) => {
        if (!confirm('Are you sure you want to delete this project?')) return;
        fetch(getApiUrl(`/api/admin/projects/${id}`), { method: 'DELETE', credentials: 'include' })
          .then(res => {
            if (!res.ok) throw new Error('Failed to delete project.');
            loadProjectsList();
          })
          .catch(err => alert(err.message));
      };
      
      // Certification Add / Edit
      const certForm = document.getElementById('cert-form');
      const certCancelBtn = document.getElementById('cancel-cert-edit');
      
      certForm.addEventListener('submit', (e) => {
        e.preventDefault();
        
        const id = document.getElementById('cert-id').value;
        const payload = {
          issuer: document.getElementById('cert-issuer').value,
          name: document.getElementById('cert-name').value
        };
        
        const url = id ? `/api/admin/certifications/${id}` : '/api/admin/certifications';
        const method = id ? 'PUT' : 'POST';
        
        fetch(getApiUrl(url), {
          method: method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
          credentials: 'include'
        })
        .then(res => {
          if (!res.ok) throw new Error('Failed to save certification.');
          return res.json();
        })
        .then(() => {
          certForm.reset();
          document.getElementById('cert-id').value = '';
          document.getElementById('cert-form-title').textContent = 'Add Certification';
          document.getElementById('cert-submit-btn').textContent = 'Save Certification';
          certCancelBtn.style.display = 'none';
          loadCertificationsList();
        })
        .catch(err => alert(err.message));
      });
      
      certCancelBtn.addEventListener('click', () => {
        certForm.reset();
        document.getElementById('cert-id').value = '';
        document.getElementById('cert-form-title').textContent = 'Add Certification';
        document.getElementById('cert-submit-btn').textContent = 'Save Certification';
        certCancelBtn.style.display = 'none';
      });
      
      window.editCertification = (id) => {
        const cert = window.allCerts.find(c => c.id === id);
        if (!cert) return;
        
        document.getElementById('cert-id').value = cert.id;
        document.getElementById('cert-issuer').value = cert.issuer;
        document.getElementById('cert-name').value = cert.name;
        
        document.getElementById('cert-form-title').textContent = 'Edit Certification';
        document.getElementById('cert-submit-btn').textContent = 'Update Certification';
        certCancelBtn.style.display = 'block';
        window.scrollTo({ top: certForm.getBoundingClientRect().top + window.pageYOffset - 120, behavior: 'smooth' });
      };
      
      window.deleteCertification = (id) => {
        if (!confirm('Are you sure you want to delete this certification?')) return;
        fetch(getApiUrl(`/api/admin/certifications/${id}`), { method: 'DELETE', credentials: 'include' })
          .then(res => {
            if (!res.ok) throw new Error('Failed to delete certification.');
            loadCertificationsList();
          })
          .catch(err => alert(err.message));
      };

      // Initial Auth Check
      checkAuth();
    });
  </script>
</body>
</html>
